<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="ssh-wrappers — two tiny POSIX shell wrappers around ssh">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.32" r="0.45">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feOffset dx="0" dy="8" in="b" result="o"/>
      <feComponentTransfer in="o" result="t">
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="t"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- accent bar -->
  <rect x="0" y="0" width="6" height="640" fill="url(#brand)"/>

  <!-- logo mark -->
  <g transform="translate(96, 110)" filter="url(#shadow)">
    <rect width="180" height="180" rx="40" fill="url(#brand)"/>
    <g fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
      <path d="M50 62 L84 90 L50 118"/>
      <path d="M96 118 L138 118"/>
    </g>
  </g>

  <!-- title -->
  <text x="320" y="190" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace" font-size="92" font-weight="700" fill="url(#title)" letter-spacing="-2">ssh-wrappers</text>

  <!-- tagline -->
  <text x="320" y="248" font-family="-apple-system, Segoe UI, system-ui, sans-serif" font-size="28" font-weight="400" fill="#cbd5e1">Two tiny POSIX shell wrappers around <tspan font-family="ui-monospace, SF Mono, Menlo, monospace" fill="#a78bfa">ssh</tspan></text>

  <!-- wrapper chips -->
  <g transform="translate(96, 360)">
    <g>
      <rect x="0" y="0" width="232" height="76" rx="14" fill="#111827" stroke="#334155" stroke-width="1"/>
      <circle cx="38" cy="38" r="18" fill="#312e81"/>
      <g transform="translate(28, 28)" fill="none" stroke="#a78bfa" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="9" width="16" height="11" rx="2"/>
        <path d="M6 9V5a4 4 0 1 1 8 0v4"/>
      </g>
      <text x="72" y="36" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="22" font-weight="700" fill="#f1f5f9">sshp</text>
      <text x="72" y="60" font-family="-apple-system, Segoe UI, system-ui, sans-serif" font-size="15" fill="#94a3b8">force password auth</text>
    </g>
    <g transform="translate(256, 0)">
      <rect x="0" y="0" width="252" height="76" rx="14" fill="#111827" stroke="#334155" stroke-width="1"/>
      <circle cx="38" cy="38" r="18" fill="#312e81"/>
      <g transform="translate(28, 28)" fill="none" stroke="#a78bfa" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="5.5" cy="13.5" r="3.5"/>
        <path d="M8 11l8.5-8.5M14 5l3 3M12 7l3 3"/>
      </g>
      <text x="72" y="36" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="22" font-weight="700" fill="#f1f5f9">sshi</text>
      <text x="72" y="60" font-family="-apple-system, Segoe UI, system-ui, sans-serif" font-size="15" fill="#94a3b8">explicit identities only</text>
    </g>
  </g>

  <!-- install command -->
  <g transform="translate(96, 488)">
    <rect width="1088" height="80" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="28" y="50" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="22" fill="#64748b">$</text>
    <text x="56" y="50" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="22" fill="#e2e8f0">curl -fsSL https://pacnpal.github.io/ssh-wrappers/install.sh | sh</text>
  </g>

  <!-- footer -->
  <text x="96" y="608" font-family="-apple-system, Segoe UI, system-ui, sans-serif" font-size="16" fill="#64748b">github.com/pacnpal/ssh-wrappers · MIT</text>
</svg>
