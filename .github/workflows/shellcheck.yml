name: shellcheck

on:
  push:
    branches: [master]
    paths:
      - 'install.sh'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    paths:
      - 'install.sh'
      - '.github/workflows/shellcheck.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: shellcheck --shell=sh install.sh
